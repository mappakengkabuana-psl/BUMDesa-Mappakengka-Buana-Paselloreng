<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akta Notaris - BUMDesa Mappakengka Buana Paselloreng</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-green: #0b2e26;
            --eco-medium: #1e5128;
            --eco-light: #4e944f;
            --accent-lime: #b4ff9f;
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #0b2e26;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            overflow-x: hidden;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        /* --- BACKGROUND BLOBS (Smooth Animation) --- */
        .bg-blobs {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.5; animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--eco-light); top: -10%; left: -5%; }
        .blob-2 { width: 400px; height: 400px; background: var(--eco-medium); bottom: 10%; right: -5%; }
        
        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 80px); }
        }

        /* --- CONTENT AREA --- */
        .content-area {
            max-width: 1000px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--primary-green);
            font-weight: 700;
            margin-bottom: 20px;
            transition: 0.3s;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
        }

        .back-btn:hover {
            background: var(--primary-green);
            color: var(--accent-lime);
            transform: translateX(-5px);
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--primary-green);
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: -0.5px;
        }

        .download-btn {
            background: var(--primary-green);
            color: var(--accent-lime);
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 20px rgba(11, 46, 38, 0.15);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .download-btn:hover {
            background: var(--eco-medium);
            transform: translateY(-3px) scale(1.05);
            color: white;
        }

        /* --- PDF VIEWER CONTAINER --- */
        .pdf-container {
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 15px;
            box-shadow: 0 20px 40px rgba(11, 46, 38, 0.05), 0 0 20px rgba(78, 148, 79, 0.1);
            height: 80vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            height: 100%;
            border-radius: 20px;
            border: none;
            background: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header-section {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .pdf-container { height: 70vh; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body onload="document.body.style.opacity='1'">

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="content-area">
        <a href="pendirian.html" class="back-btn animate__animated animate__fadeInLeft">
            <i class="fas fa-arrow-left"></i> Kembali ke Halaman Pendirian
        </a>

        <div class="header-section animate__animated animate__zoomIn">
            <div>
                <h1>Akta Notaris BUMDesa</h1>
                <p style="color: var(--eco-medium); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;">Dokumen Otentik Pendirian</p>
            </div>
            
            <a href="dokumen/notaris.pdf" download="Akta-Notaris-BUMDesa.pdf" class="download-btn" target="_blank">
                <i class="fas fa-file-signature"></i> Unduh Salinan
            </a>
        </div>

        <section class="pdf-container animate__animated animate__fadeInUp" style="animation-delay: 0.2s;">
            <iframe 
                src="dokumen/notaris.pdf#toolbar=0&navpanes=0&view=FitH" 
                type="application/pdf">
                <p>Browser Anda tidak mendukung tampilan PDF. 
                   <a href="dokumen/notaris.pdf">Klik di sini untuk mengunduh.</a>
                </p>
            </iframe>
        </section>
    </main>

    <script>
        // Logika Transisi Halaman (Fade Out sebelum pindah)
        document.querySelectorAll('.back-btn').forEach(link => {
            link.addEventListener('click', function(e) {
                e.preventDefault();
                const target = this.getAttribute('href');
                document.body.style.opacity = '0';
                setTimeout(() => { 
                    window.location.href = target; 
                }, 600);
            });
        });
    </script>
</body>
</html>
