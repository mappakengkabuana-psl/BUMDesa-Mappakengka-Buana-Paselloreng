<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pembaruan Data - BUMDesa Mappakengka Buana Paselloreng</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        :root {
            --primary-green: #0b2e26;
            --eco-medium: #1e5128;
            --eco-light: #4e944f;
            --accent-lime: #b4ff9f;
            --glass-border: rgba(255, 255, 255, 0.3);
            --text-main: #0b2e26;
        }

        * {
            margin: 0; padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* --- BACKGROUND BLOBS --- */
        .bg-blobs {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1;
        }

        .blob {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.5; animation: float 20s infinite alternate ease-in-out;
        }

        .blob-1 { width: 500px; height: 500px; background: var(--eco-light); top: -10%; left: -5%; }
        .blob-2 { width: 400px; height: 400px; background: var(--eco-medium); bottom: 10%; right: -5%; }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 80px); }
        }

        /* --- MAINTENANCE CARD --- */
        .maintenance-container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 45px;
            box-shadow: 0 30px 60px rgba(11, 46, 38, 0.1);
            position: relative;
        }

        .icon-wrapper {
            margin-bottom: 30px;
            position: relative;
            display: inline-block;
        }

        .gear-main {
            font-size: 5rem;
            color: var(--primary-green);
            animation: spin-clockwise 8s infinite linear;
        }

        .gear-small {
            font-size: 2.5rem;
            color: var(--eco-light);
            position: absolute;
            top: -10px;
            right: -25px;
            animation: spin-counter-clockwise 4s infinite linear;
        }

        @keyframes spin-clockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes spin-counter-clockwise { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }

        h1 {
            color: var(--primary-green);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        p {
            color: var(--eco-medium);
            line-height: 1.7;
            margin-bottom: 35px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* --- PROGRESS BAR --- */
        .progress-wrapper {
            background: rgba(11, 46, 38, 0.1);
            height: 12px;
            border-radius: 20px;
            margin-bottom: 40px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, var(--eco-medium), var(--eco-light), var(--accent-lime));
            width: 0%;
            border-radius: 20px;
            animation: loading 4s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes loading {
            0% { width: 0%; }
            100% { width: 85%; } 
        }

        /* --- BUTTON --- */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 38px;
            background: var(--primary-green);
            color: var(--accent-lime);
            text-decoration: none;
            border-radius: 100px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 30px rgba(11, 46, 38, 0.2);
        }

        .btn-back:hover {
            background: var(--eco-medium);
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(11, 46, 38, 0.3);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.7rem; }
            .maintenance-container { padding: 50px 25px; }
            .gear-main { font-size: 4rem; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <main class="maintenance-container animate__animated animate__zoomIn">
        <div class="icon-wrapper">
            <i class="fas fa-cog gear-main"></i>
            <i class="fas fa-cog gear-small"></i>
        </div>
        
        <h1>Sinkronisasi Data</h1>
        <p>Mohon menunggu sejenak. Kami sedang memperbarui basis data untuk memastikan informasi unit usaha yang Anda akses akurat dan transparan.</p>

        <div class="progress-wrapper">
            <div class="progress-bar"></div>
        </div>

        <a href="unit-usaha.html" class="btn-back" id="btnBack">
            <i class="fas fa-arrow-left"></i> Kembali ke Unit Usaha
        </a>
    </main>

    <script>
        // Efek transisi halus saat keluar
        document.getElementById('btnBack').addEventListener('click', function(e) {
            e.preventDefault();
            const target = this.getAttribute('href');
            document.querySelector('.maintenance-container').classList.add('animate__zoomOut');
            setTimeout(() => {
                window.location.href = target;
            }, 500);
        });
    </script>
</body>
</html>
