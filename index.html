<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUMDesa Mappakengka Buana Paselloreng</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        :root {
            --primary-green: #0b2e26;
            --eco-medium: #1e5128;
            --eco-light: #4e944f;
            --accent-lime: #b4ff9f;
            --glass-border: rgba(255, 255, 255, 0.25);
            --text-main: #0b2e26;
            --glow-color: rgba(78, 148, 79, 0.4);
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            background-attachment: fixed;
            min-height: 100vh;
            width: 100vw;
            color: var(--text-main);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            /* SINKRONISASI TRANSISI */
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }

        /* --- BACKGROUND BLOBS --- */
        .bg-blobs {
            position: fixed;
            width: 100%; height: 100%;
            top: 0; left: 0; z-index: -1; overflow: hidden;
        }
        .blob {
            position: absolute; border-radius: 50%; filter: blur(100px);
            opacity: 0.5; animation: float 20s infinite alternate ease-in-out;
        }
        .blob-1 { width: 600px; height: 600px; background: var(--eco-light); top: -10%; left: -10%; }
        .blob-2 { width: 500px; height: 500px; background: var(--eco-medium); bottom: -10%; right: -5%; }
        .blob-3 { width: 300px; height: 300px; background: var(--accent-lime); top: 30%; right: 10%; opacity: 0.2; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 100px) scale(1.1); }
        }

        /* --- NAVIGATION (SINKRON DENGAN HALAMAN LAIN) --- */
        .nav-wrapper { 
            position: fixed; top: 0; width: 100%; z-index: 1000; 
            padding: 15px 20px; 
            display: flex; justify-content: center;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .nav-up { transform: translateY(-120%) !important; }
        
        nav { 
            max-width: 1000px; width: auto;
            background: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); 
            border: 1px solid var(--glass-border); border-radius: 100px; 
            padding: 8px; box-shadow: 0 10px 30px rgba(11, 46, 38, 0.1); 
            transition: all 0.3s ease;
        }
        .nav-scrolled nav { background: rgba(255, 255, 255, 0.85); max-width: 900px; }

        nav ul { display: flex; list-style: none; gap: 5px; }
        nav ul li a {
            text-decoration: none; color: var(--primary-green);
            font-weight: 700; font-size: 0.85rem; padding: 10px 18px;
            border-radius: 50px; transition: 0.3s;
            display: flex; align-items: center; gap: 8px;
            white-space: nowrap;
        }
        nav ul li a:hover, nav ul li a.active { background: var(--primary-green); color: var(--accent-lime); }

        .hamburger-menu { display: none; cursor: pointer; padding: 10px; }
        .hamburger-lines { width: 22px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; }
        .line { height: 3px; width: 100%; background: var(--primary-green); border-radius: 10px; }

        /* --- CONTENT AREA --- */
        .content-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px 80px;
        }
        
        .glass-hero {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            padding: 60px 45px;
            border-radius: 50px;
            text-align: center;
            max-width: 800px;
            box-shadow: 0 25px 50px rgba(11, 46, 38, 0.15), 0 0 20px var(--glow-color);
        }

        .hero-brand .sub-title { 
            font-family: 'Cinzel', serif; 
            font-size: 2.8rem; 
            margin-bottom: 20px; 
            line-height: 1.1;
            font-weight: 900;
            background: linear-gradient(to right, var(--primary-green) 10%, var(--eco-light) 60%, var(--primary-green) 90%);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
        }

        @keyframes shine { to { background-position: 200% center; } }

        .btn-eco {
            display: inline-block;
            background: var(--primary-green);
            color: #ffffff;
            padding: 16px 45px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(11, 46, 38, 0.3);
            margin-top: 25px;
        }
        .btn-eco:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(11, 46, 38, 0.4); background: var(--eco-medium); }

        /* --- FOOTER --- */
        footer {
            padding: 25px 20px;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-top: 1px solid var(--glass-border);
            margin-top: auto;
        }

        footer p { font-size: 0.85rem; color: var(--primary-green); font-weight: 600; }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-wrapper { justify-content: flex-end; padding: 15px 20px; transform: none !important; }
            nav { border-radius: 12px; padding: 0; background: rgba(255, 255, 255, 0.3); }
            .hamburger-menu { display: block; }
            
            nav ul {
                display: none; flex-direction: column; position: absolute;
                top: 65px; right: 20px; width: 240px;
                background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(20px);
                border-radius: 20px; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid white;
            }

            nav ul.show { display: flex; animation: fadeInDown 0.3s ease-out forwards; }
            .hero-brand .sub-title { font-size: 1.8rem; }
            .glass-hero { padding: 40px 25px; border-radius: 35px; }
            footer p span { display: block; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body onload="document.body.style.opacity='1'">

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="nav-wrapper" id="navWrapper">
        <nav id="navbar">
            <div class="hamburger-menu" onclick="toggleMenu(event)">
                <div class="hamburger-lines">
                    <span class="line"></span>
                    <span class="line"></span>
                    <span class="line"></span>
                </div>
            </div>

            <ul id="nav-list">
                <li><a href="index.html" class="active"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="pendirian.html"><i class="fas fa-seedling"></i> Pendirian</a></li>
                <li><a href="unit-usaha.html"><i class="fas fa-tree"></i> Unit Usaha</a></li>
                <li><a href="pengurus.html"><i class="fas fa-users"></i> Pengurus</a></li>
                <li><a href="transparansi.html"><i class="fas fa-hand-holding-heart"></i> Transparansi</a></li>
                <li><a href="hubungi.html"><i class="fas fa-envelope"></i> Hubungi</a></li>
            </ul>
        </nav>
    </div>

    <main class="content-area">
        <section class="glass-hero animate__animated animate__fadeInUp">
            <i class="fas fa-seedling" style="font-size: 2rem; color: var(--eco-light); margin-bottom: 15px; display: block;"></i>
            <div class="hero-brand">
                <span class="est-text" style="color: var(--eco-medium); font-weight: 800; text-transform: uppercase; letter-spacing: 5px; font-size: 0.8rem; display: block; margin-bottom: 10px;">Est 2026</span>
                <span class="main-title" style="display: block; font-size: 1.1rem; color: var(--eco-light); font-weight: 700; letter-spacing: 2px;">Badan Usaha Milik Desa</span>
                <h1 class="sub-title">Mappakengka Buana Paselloreng</h1>
            </div>
            <p style="font-size: 1.1rem; line-height: 1.6; color: var(--primary-green); margin: 0 auto; max-width: 90%;">
                Membangun masa depan desa yang berkelanjutan melalui pemberdayaan potensi lokal.
            </p>
            <a href="tentang-kami.html" class="btn-eco" onclick="navigate(event, 'tentang-kami.html')">
                TENTANG KAMI <i class="fas fa-chevron-right" style="margin-left: 10px;"></i>
            </a>
        </section>
    </main>

    <footer class="animate__animated animate__fadeInUp" style="animation-delay: 0.8s;">
        <p>&copy; 2026 <span>BUMDesa Mappakengka Buana Paselloreng</span></p>
    </footer>

    <script>
        // 1. Tambahkan ini di paling atas script
    if (history.scrollRestoration) {
        history.scrollRestoration = 'manual';
    }

    // 2. Tambahkan ini agar saat refresh benar-benar kembali ke atas
    window.scrollTo(0, 0);

    function toggleMenu(event) {
        // ... kode toggleMenu Anda ...
    }
        // LOGIKA NAVIGASI DENGAN FADE OUT
        function navigate(event, url) {
            event.preventDefault();
            document.body.style.opacity = '0';
            setTimeout(() => { window.location.href = url; }, 600);
        }

        function toggleMenu(event) {
            event.stopPropagation();
            document.getElementById("nav-list").classList.toggle("show");
        }

        window.onclick = function(event) {
            const navList = document.getElementById("nav-list");
            if (!event.target.closest('nav') && navList.classList.contains('show')) {
                navList.classList.remove('show');
            }
        }

        // SCROLL BEHAVIOR (SINKRON DENGAN HALAMAN LAIN)
        let lastScrollTop = 0;
        const navWrapper = document.getElementById('navWrapper');
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            
            if (scrollTop > 50) navWrapper.classList.add('nav-scrolled');
            else navWrapper.classList.remove('nav-scrolled');
            
            if (window.innerWidth > 768) {
                if (scrollTop > lastScrollTop && scrollTop > 100) navWrapper.classList.add('nav-up');
                else navWrapper.classList.remove('nav-up');
            }
            lastScrollTop = scrollTop;
        });

        // APPLY NAVIGASI KE SEMUA LINK MENU
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if(href && !href.includes('#') && !this.classList.contains('active')) {
                    navigate(e, href);
                }
            });
        });
    </script>
</body>
</html>
